<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f111a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>A4 Composer</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="assets/logo/logo02.svg">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
  <!-- Barre d'outils haut (outils calque — visible si calque sélectionné) -->
  <div id="toolbar-top" style="display:none;">
    <div class="toolbar-group">
      <button id="btn-crop" class="tool-btn" title="Recadrer"></button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-front" class="tool-btn" title="Premier plan"></button>
      <button id="btn-back" class="tool-btn" title="Arrière-plan"></button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-delete" class="tool-btn" title="Supprimer"></button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-lock" class="tool-btn" title="Bloquer / Débloquer"></button>
    </div>
  </div>

  <!-- Barre d'outils crop (visible en mode recadrage) -->
  <div id="toolbar-crop" style="display:none;">
    <button id="btn-crop-cancel" class="tool-btn" title="Annuler"></button>
    <button id="btn-crop-ok" class="tool-btn primary" title="Valider"></button>
  </div>

  <!-- Zone de travail A4 -->
  <div id="workspace">
    <canvas id="preview"></canvas>
  </div>

  <!-- Barre d'outils bas (outils plan de travail — toujours visible) -->
  <div id="toolbar-bottom">
    <div class="toolbar-group">
      <button id="btn-import" class="tool-btn" title="Importer"></button>
      <input type="file" id="import-input" multiple accept="image/*" hidden>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-portrait" class="tool-btn active" title="Portrait"></button>
      <button id="btn-landscape" class="tool-btn" title="Paysage"></button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-export" class="tool-btn" title="Exporter JPG"></button>
    </div>
    <div class="toolbar-separator"></div>
    <div class="toolbar-group">
      <button id="btn-undo" class="tool-btn" title="Annuler"></button>
      <button id="btn-redo" class="tool-btn" title="Refaire"></button>
    </div>
  </div>

  <!-- Modal confirmation -->
  <div id="modal-confirm" class="modal" style="display:none;">
    <div class="modal-content glass">
      <p id="modal-message"></p>
      <div class="modal-buttons">
        <button id="modal-cancel" class="modal-btn">Annuler</button>
        <button id="modal-ok" class="modal-btn primary">Confirmer</button>
      </div>
    </div>
  </div>

  <script type="module" src="icons.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
